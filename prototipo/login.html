<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Entrar</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="phone">
  <div class="topbar">
    <a href="index.html" class="back">←</a>
    <h1>Conta</h1>
    <button type="button" class="menu-btn" id="btn-menu" aria-label="Abrir menu">☰</button>
  </div>
  <div class="content content-center" id="conteudo"></div>

  <div class="tabbar">
    <a href="index.html"><span class="icon">🏠</span>Início</a>
    <a href="adicionar.html"><span class="icon">➕</span>Adicionar</a>
    <a href="login.html" class="active"><span class="icon">👤</span>Conta</a>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script src="js/menu.js"></script>
<script>
const conteudo = document.getElementById("conteudo");
const next = getQueryParam("next");

function renderLogado(usuarioLogado) {
  conteudo.innerHTML = `
    <div class="account-box">
      <div class="account-avatar">👤</div>
      <strong>${usuarioLogado.nome}</strong>
      <span>Usuário: ${usuarioLogado.usuario}</span>
      <div class="account-badge">✓ Acesso liberado para editar</div>
    </div>
    <p class="hint" style="text-align:center;">Login somente para edição.</p>
    <button class="btn-secondary" id="btn-sair">Sair</button>
  `;
  document.getElementById("btn-sair").addEventListener("click", () => {
    fazerLogout();
    renderDeslogado();
  });
}

function renderDeslogado(erro) {
  conteudo.innerHTML = `
    <div class="login-hero">
      <div class="login-hero-icon">🔒</div>
      <h2>Entrar na conta</h2>
      <p class="hint">Só quem tem cadastro consegue adicionar fabricantes, acessórios e manuais. Pra só consultar, não precisa entrar.</p>
    </div>
    <div class="login-card">
      ${erro ? `<div class="error-msg">${erro}</div>` : ""}
      <div class="field">
        <label>Usuário</label>
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input type="text" id="input-usuario" placeholder="Seu usuário" autocomplete="username" autofocus>
        </div>
      </div>
      <div class="field">
        <label>Senha</label>
        <div class="input-wrap">
          <span class="input-icon">🔑</span>
          <input type="password" id="input-senha" placeholder="Sua senha" autocomplete="current-password">
          <button type="button" class="toggle-senha" id="btn-toggle-senha" aria-label="Mostrar senha">👁️</button>
        </div>
      </div>
      <button class="btn-primary" id="btn-entrar">Entrar</button>
    </div>
  `;
  document.getElementById("btn-entrar").addEventListener("click", tentarLogin);
  document.getElementById("input-usuario").addEventListener("keydown", (e) => {
    if (e.key === "Enter") tentarLogin();
  });
  document.getElementById("input-senha").addEventListener("keydown", (e) => {
    if (e.key === "Enter") tentarLogin();
  });
  document.getElementById("btn-toggle-senha").addEventListener("click", () => {
    const campo = document.getElementById("input-senha");
    const btn = document.getElementById("btn-toggle-senha");
    const mostrando = campo.type === "text";
    campo.type = mostrando ? "password" : "text";
    btn.textContent = mostrando ? "👁️" : "🙈";
  });
}

function tentarLogin() {
  const usuario = document.getElementById("input-usuario").value.trim();
  const senha = document.getElementById("input-senha").value;
  if (fazerLogin(usuario, senha)) {
    window.location.href = next || "index.html";
  } else {
    renderDeslogado("Usuário ou senha incorretos.");
  }
}

const usuarioLogado = getUsuarioLogado();
if (usuarioLogado) {
  renderLogado(usuarioLogado);
} else {
  renderDeslogado();
}
</script>
</body>
</html>
