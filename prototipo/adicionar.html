<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Adicionar</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="js/plataforma.js"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="phone">
  <div class="topbar">
    <a href="index.html" class="back">←</a>
    <h1 id="titulo-topo">Adicionar</h1>
    <button type="button" class="menu-btn" id="btn-menu" aria-label="Abrir menu">☰</button>
  </div>
  <div class="content">
    <div class="segmented" id="segmented-tipo">
      <button type="button" id="tab-acessorio" class="active">Acessório</button>
      <button type="button" id="tab-fabricante">Fabricante</button>
    </div>

    <div id="form-acessorio">
      <div class="field">
        <label>Fabricante</label>
        <select id="input-fabricante"></select>
      </div>

      <div class="field">
        <label>Foto do produto</label>
        <label class="upload" id="upload-capa">
          <span class="icon">📷</span>
          <span>Toque para escolher uma foto</span>
          <input type="file" accept="image/*" id="input-capa">
        </label>
      </div>

      <div class="field">
        <label>Nome do acessório</label>
        <input type="text" id="input-nome" placeholder="Ex: Dobradiça Clip Top">
      </div>

      <div class="field">
        <label>Categoria</label>
        <input type="text" id="input-categoria" placeholder="Ex: Dobradiça, Corrediça, Pé...">
      </div>

      <div class="field">
        <label>Especificações (opcional)</label>
        <textarea id="input-especificacoes" placeholder="Ex: Suporta 40kg e 70kg. Vida útil de 12 a 18 anos em uso correto."></textarea>
      </div>

      <div class="field">
        <label>Formato do manual</label>
        <div class="segmented" id="segmented-manual-tipo">
          <button type="button" id="manual-tipo-passos" class="active">Passo a passo</button>
          <button type="button" id="manual-tipo-pdf">PDF</button>
          <button type="button" id="manual-tipo-video">Vídeo</button>
        </div>
      </div>

      <div id="secao-passos">
        <div class="section-title">Passos de instalação</div>
        <div id="lista-passos"></div>
        <button class="btn-secondary" onclick="adicionarPasso()">+ Adicionar passo</button>
      </div>

      <div class="field" id="secao-manual-pdf" style="display:none;">
        <label>Arquivo PDF do manual (máx. 20MB)</label>
        <div id="preview-manual-pdf"></div>
      </div>

      <div class="field" id="secao-manual-video" style="display:none;">
        <label>Vídeo do manual (máx. 30MB)</label>
        <div id="preview-manual-video"></div>
      </div>

      <div style="height:16px"></div>
      <button class="btn-primary" onclick="salvarAcessorio()" id="btn-salvar-acessorio">Salvar acessório</button>
      <button class="btn-secondary" type="button" onclick="cancelar()">Cancelar</button>
    </div>

    <div id="form-fabricante" style="display:none;">
      <div class="field">
        <label>Tipo</label>
        <div class="segmented" id="segmented-tipo-fabricante">
          <button type="button" id="tipo-fabricante-ferragem" class="active">Ferragem</button>
          <button type="button" id="tipo-fabricante-eletro">Eletrodoméstico</button>
        </div>
      </div>

      <div class="field">
        <label>Logo do fabricante</label>
        <label class="upload" id="upload-logo-fabricante">
          <span class="icon">🖼️</span>
          <span>Toque para escolher uma logo (opcional)</span>
          <input type="file" accept="image/*" id="input-fabricante-logo">
        </label>
      </div>

      <div class="field">
        <label>Nome do fabricante</label>
        <input type="text" id="input-fabricante-nome" placeholder="Ex: Salice">
      </div>

      <div class="field">
        <label>Cor de destaque</label>
        <input type="color" id="input-fabricante-cor" value="#2f6b4f">
      </div>

      <div class="field">
        <label>Site do fabricante (opcional)</label>
        <input type="url" id="input-fabricante-site" placeholder="https://...">
      </div>

      <div style="height:16px"></div>
      <button class="btn-primary" onclick="salvarFabricante()" id="btn-salvar-fabricante">Salvar fabricante</button>
      <button class="btn-secondary" type="button" onclick="cancelar()">Cancelar</button>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script src="js/cropper.js"></script>
<script src="js/versao.js"></script>
<script src="js/menu.js"></script>
<script>
let capaBase64 = null;
let capaOriginal = null;
let logoFabricanteBase64 = null;
let logoFabricanteOriginal = null;
let tipoFabricanteAtual = "ferragem";
let manualTipoAcessorio = "passos";
let manualPdfBase64 = null;
let manualPdfNome = null;
let manualVideoBase64 = null;
let passos = [];
let formAlterado = false;

function definirTipoFabricante(tipo) {
  tipoFabricanteAtual = tipo === "eletrodomestico" ? "eletrodomestico" : "ferragem";
  document.getElementById("tipo-fabricante-ferragem").classList.toggle("active", tipoFabricanteAtual === "ferragem");
  document.getElementById("tipo-fabricante-eletro").classList.toggle("active", tipoFabricanteAtual === "eletrodomestico");
}

function definirManualTipo(tipo) {
  manualTipoAcessorio = ["passos", "pdf", "video"].includes(tipo) ? tipo : "passos";
  document.getElementById("manual-tipo-passos").classList.toggle("active", manualTipoAcessorio === "passos");
  document.getElementById("manual-tipo-pdf").classList.toggle("active", manualTipoAcessorio === "pdf");
  document.getElementById("manual-tipo-video").classList.toggle("active", manualTipoAcessorio === "video");
  document.getElementById("secao-passos").style.display = manualTipoAcessorio === "passos" ? "block" : "none";
  document.getElementById("secao-manual-pdf").style.display = manualTipoAcessorio === "pdf" ? "block" : "none";
  document.getElementById("secao-manual-video").style.display = manualTipoAcessorio === "video" ? "block" : "none";
}

const PDF_TAMANHO_MAXIMO = 20 * 1024 * 1024; // 20MB
const MANUAL_VIDEO_TAMANHO_MAXIMO = 30 * 1024 * 1024; // 30MB - manual inteiro, maior que o video de 1 passo (15MB)

function onManualPdf(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > PDF_TAMANHO_MAXIMO) {
    alert("PDF muito grande (máx. 20MB).");
    input.value = "";
    return;
  }
  const leitor = new FileReader();
  leitor.onload = () => {
    manualPdfBase64 = leitor.result;
    manualPdfNome = file.name;
    marcarAlterado();
    renderPreviewManualPdf();
  };
  leitor.readAsDataURL(file);
}

function removerManualPdf() {
  manualPdfBase64 = null;
  manualPdfNome = null;
  marcarAlterado();
  renderPreviewManualPdf();
}

function renderPreviewManualPdf() {
  const el = document.getElementById("preview-manual-pdf");
  el.innerHTML = manualPdfBase64
    ? `<div class="arquivo-anexado">📄 ${manualPdfNome || "PDF anexado"}</div>
       <button type="button" class="btn-secondary" style="margin-top:8px" onclick="removerManualPdf()">Remover PDF</button>`
    : `<label class="upload">
         <span class="icon">📄</span><span>Toque para escolher o PDF</span>
         <input type="file" accept="application/pdf" onchange="onManualPdf(this)">
       </label>`;
}

function onManualVideo(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > MANUAL_VIDEO_TAMANHO_MAXIMO) {
    alert("Vídeo muito grande (máx. 30MB). Grave um vídeo mais curto ou em qualidade menor.");
    input.value = "";
    return;
  }
  const leitor = new FileReader();
  leitor.onload = () => {
    manualVideoBase64 = leitor.result;
    marcarAlterado();
    renderPreviewManualVideo();
  };
  leitor.readAsDataURL(file);
}

function removerManualVideo() {
  manualVideoBase64 = null;
  marcarAlterado();
  renderPreviewManualVideo();
}

function renderPreviewManualVideo() {
  const el = document.getElementById("preview-manual-video");
  el.innerHTML = manualVideoBase64
    ? `<video src="${manualVideoBase64}" controls style="width:100%;border-radius:10px;max-height:200px;background:#000"></video>
       <button type="button" class="btn-secondary" style="margin-top:8px" onclick="removerManualVideo()">Remover vídeo</button>`
    : `<label class="upload">
         <span class="icon">🎬</span><span>Toque para escolher o vídeo</span>
         <input type="file" accept="video/*" onchange="onManualVideo(this)">
       </label>`;
}

function renderSelectFabricante() {
  const fabricantes = getTodosFabricantes();
  const ferragens = fabricantes.filter((f) => (f.tipo || "ferragem") === "ferragem");
  const eletro = fabricantes.filter((f) => f.tipo === "eletrodomestico");
  const optgroup = (label, itens) => itens.length
    ? `<optgroup label="${label}">${itens.map((f) => `<option value="${f.id}">${f.nome}</option>`).join("")}</optgroup>`
    : "";
  selectFabricante.innerHTML = optgroup("Ferragens", ferragens) + optgroup("Eletrodomésticos", eletro);
}

function marcarAlterado() {
  formAlterado = true;
}

document.addEventListener("input", (e) => {
  if (e.target.closest("#form-acessorio, #form-fabricante")) marcarAlterado();
});
document.addEventListener("change", (e) => {
  if (e.target.closest("#form-acessorio, #form-fabricante")) marcarAlterado();
});
window.addEventListener("beforeunload", (e) => {
  if (!formAlterado) return;
  e.preventDefault();
  e.returnValue = "";
});

function cancelar() {
  if (idEditarAcessorio) {
    window.location.href = `acessorio.html?id=${idEditarAcessorio}`;
  } else if (idEditarFabricante) {
    window.location.href = `fabricante.html?id=${idEditarFabricante}`;
  } else {
    window.location.href = "index.html";
  }
}

const idEditarAcessorio = getQueryParam("editarAcessorio");
const idEditarFabricante = getQueryParam("editarFabricante");

const selectFabricante = document.getElementById("input-fabricante");

async function iniciar() {
  if (!exigirPermissaoAdicionar(window.location.href)) {
    document.querySelector(".content").innerHTML = emptyState("🔒", "É preciso entrar para adicionar ou editar fabricantes e acessórios. Redirecionando para o login...");
    return;
  }

  await sincronizarCatalogo();
  renderSelectFabricante();

  if (idEditarAcessorio) {
    iniciarEdicaoAcessorio();
  } else if (idEditarFabricante) {
    iniciarEdicaoFabricante();
  } else {
    const tipoContexto = getQueryParam("tipo") === "eletrodomestico" ? "eletrodomestico" : "ferragem";
    definirTipoFabricante(tipoContexto);

    const fabricantePreSelecionado = getQueryParam("fabricante");
    if (fabricantePreSelecionado && getFabricantePorId(fabricantePreSelecionado)) {
      selectFabricante.value = fabricantePreSelecionado;
    } else {
      const semFabricanteDoTipo = getTodosFabricantes().every((f) => (f.tipo || "ferragem") !== tipoContexto);
      if (tipoContexto === "eletrodomestico" && semFabricanteDoTipo) mostrarAba("fabricante");
    }
  }

  document.getElementById("tipo-fabricante-ferragem").addEventListener("click", () => definirTipoFabricante("ferragem"));
  document.getElementById("tipo-fabricante-eletro").addEventListener("click", () => definirTipoFabricante("eletrodomestico"));

  document.getElementById("tab-acessorio").addEventListener("click", () => mostrarAba("acessorio"));
  document.getElementById("tab-fabricante").addEventListener("click", () => mostrarAba("fabricante"));

  document.getElementById("manual-tipo-passos").addEventListener("click", () => definirManualTipo("passos"));
  document.getElementById("manual-tipo-pdf").addEventListener("click", () => definirManualTipo("pdf"));
  document.getElementById("manual-tipo-video").addEventListener("click", () => definirManualTipo("video"));

  document.addEventListener("change", (e) => {
    if (e.target.id === "input-capa") {
      const file = e.target.files[0];
      if (!file) return;
      abrirRecorte(file, "4/3", "jpeg", (dataUrl) => {
        capaBase64 = dataUrl;
        capaOriginal = null;
        refletirCapaPreview();
      });
    }
    if (e.target.id === "input-fabricante-logo") {
      const file = e.target.files[0];
      if (!file) return;
      abrirRecorte(file, "1/1", "png", (dataUrl) => {
        logoFabricanteBase64 = dataUrl;
        logoFabricanteOriginal = null;
        refletirLogoPreview();
      });
    }
  });

  renderPassos();
  renderPreviewManualPdf();
  renderPreviewManualVideo();
}

iniciar();

function iniciarEdicaoAcessorio() {
  const original = getAcessorioPorId(idEditarAcessorio);
  if (!original) {
    alert("Acessório não encontrado.");
    window.location.href = "index.html";
    return;
  }
  document.getElementById("titulo-topo").textContent = "Editar acessório";
  document.getElementById("segmented-tipo").style.display = "none";
  document.getElementById("form-fabricante").style.display = "none";
  document.getElementById("btn-salvar-acessorio").textContent = "Salvar alterações";

  selectFabricante.value = original.fabricanteId;
  document.getElementById("input-nome").value = original.nome;
  document.getElementById("input-categoria").value = original.categoria;
  document.getElementById("input-especificacoes").value = original.especificacoes || "";

  capaBase64 = original.imagemBase64 || null;
  capaOriginal = original.imagemBase64 ? null : (original.imagem || null);
  refletirCapaPreview();

  passos = original.passos.map(p => ({
    texto: p.texto,
    imagemBase64: p.imagemBase64 || null,
    imagemOriginal: p.imagemBase64 ? null : (p.imagem || null),
    videoBase64: p.videoBase64 || null
  }));

  definirManualTipo(original.manualTipo || "passos");
  manualPdfBase64 = original.manualPdfBase64 || null;
  manualPdfNome = manualPdfBase64 ? "PDF atual" : null;
  manualVideoBase64 = original.manualVideoBase64 || null;
  renderPreviewManualPdf();
  renderPreviewManualVideo();
}

function iniciarEdicaoFabricante() {
  const original = getFabricantePorId(idEditarFabricante);
  if (!original) {
    alert("Fabricante não encontrado.");
    window.location.href = "index.html";
    return;
  }
  document.getElementById("titulo-topo").textContent = "Editar fabricante";
  document.getElementById("segmented-tipo").style.display = "none";
  mostrarAba("fabricante");
  document.getElementById("btn-salvar-fabricante").textContent = "Salvar alterações";

  definirTipoFabricante(original.tipo || "ferragem");
  document.getElementById("input-fabricante-nome").value = original.nome;
  document.getElementById("input-fabricante-cor").value = original.cor || "#2f6b4f";
  document.getElementById("input-fabricante-site").value = original.site || "";

  logoFabricanteBase64 = original.logoBase64 || null;
  logoFabricanteOriginal = original.logoBase64 ? null : (original.logo || null);
  refletirLogoPreview();
}

function refletirCapaPreview() {
  const el = document.getElementById("upload-capa");
  if (capaBase64) {
    el.innerHTML = `<img src="${capaBase64}"><input type="file" accept="image/*" id="input-capa">`;
  } else if (capaOriginal) {
    el.innerHTML = `${assetImg(capaOriginal, "Foto atual")}<input type="file" accept="image/*" id="input-capa">`;
  }
}

function refletirLogoPreview() {
  const el = document.getElementById("upload-logo-fabricante");
  if (logoFabricanteBase64) {
    el.innerHTML = `<img src="${logoFabricanteBase64}"><input type="file" accept="image/*" id="input-fabricante-logo">`;
  } else if (logoFabricanteOriginal) {
    el.innerHTML = `${assetImg(logoFabricanteOriginal, "Logo atual")}<input type="file" accept="image/*" id="input-fabricante-logo">`;
  }
}

function mostrarAba(aba) {
  document.getElementById("tab-acessorio").classList.toggle("active", aba === "acessorio");
  document.getElementById("tab-fabricante").classList.toggle("active", aba === "fabricante");
  document.getElementById("form-acessorio").style.display = aba === "acessorio" ? "block" : "none";
  document.getElementById("form-fabricante").style.display = aba === "fabricante" ? "block" : "none";
}

function adicionarPasso() {
  passos.push({ texto: "", imagemBase64: null, imagemOriginal: null, videoBase64: null });
  marcarAlterado();
  renderPassos();
}

function removerPasso(i) {
  passos.splice(i, 1);
  marcarAlterado();
  renderPassos();
}

function onImagemPasso(i, input) {
  const file = input.files[0];
  if (!file) return;
  abrirRecorte(file, "1/1", "jpeg", (dataUrl) => {
    passos[i].imagemBase64 = dataUrl;
    passos[i].imagemOriginal = null;
    renderPassos();
  });
}

const VIDEO_TAMANHO_MAXIMO = 15 * 1024 * 1024; // 15MB - upload vai direto pro banco como base64

function onVideoPasso(i, input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > VIDEO_TAMANHO_MAXIMO) {
    alert("Vídeo muito grande (máx. 15MB). Grave um vídeo mais curto ou em qualidade menor.");
    input.value = "";
    return;
  }
  const leitor = new FileReader();
  leitor.onload = () => {
    passos[i].videoBase64 = leitor.result;
    renderPassos();
  };
  leitor.readAsDataURL(file);
}

function removerVideoPasso(i) {
  passos[i].videoBase64 = null;
  marcarAlterado();
  renderPassos();
}

function onTextoPasso(i, value) {
  passos[i].texto = value;
}

function renderPassos() {
  const container = document.getElementById("lista-passos");
  container.innerHTML = passos.map((p, i) => `
    <div class="step-card">
      <button class="remove" onclick="removerPasso(${i})">Remover</button>
      <div class="field">
        <label>Passo ${i + 1} — Foto</label>
        <label class="upload">
          ${p.imagemBase64 ? `<img src="${p.imagemBase64}">` : (p.imagemOriginal ? assetImg(p.imagemOriginal, "Foto atual") : `<span class="icon">🖼️</span><span>Escolher foto do passo</span>`)}
          <input type="file" accept="image/*" onchange="onImagemPasso(${i}, this)">
        </label>
      </div>
      <div class="field">
        <label>Vídeo do passo (opcional, máx. 15MB)</label>
        ${p.videoBase64
          ? `<video src="${p.videoBase64}" controls style="width:100%;border-radius:10px;max-height:200px;background:#000"></video>
             <button type="button" class="btn-secondary" style="margin-top:8px" onclick="removerVideoPasso(${i})">Remover vídeo</button>`
          : `<label class="upload">
               <span class="icon">🎬</span><span>Escolher vídeo do passo</span>
               <input type="file" accept="video/*" onchange="onVideoPasso(${i}, this)">
             </label>`}
      </div>
      <div class="field">
        <label>Descrição do passo</label>
        <textarea placeholder="Explique o que fazer neste passo..." oninput="onTextoPasso(${i}, this.value)">${p.texto}</textarea>
      </div>
    </div>
  `).join("") || emptyState("📋", "Nenhum passo adicionado ainda.");
}

async function salvarAcessorio() {
  if (!podeAdicionar()) { window.location.href = "login.html"; return; }
  const fabricanteId = selectFabricante.value;
  const nome = document.getElementById("input-nome").value.trim();
  const categoria = document.getElementById("input-categoria").value.trim();
  const especificacoes = document.getElementById("input-especificacoes").value.trim();

  if (!fabricanteId) { alert("Cadastre um fabricante antes de adicionar um acessório."); return; }
  if (!nome) { alert("Informe o nome do acessório."); return; }
  if (!categoria) { alert("Informe a categoria do acessório."); return; }
  if (manualTipoAcessorio === "passos") {
    if (passos.length === 0) { alert("Adicione pelo menos um passo."); return; }
    if (passos.some(p => !p.texto.trim())) { alert("Preencha a descrição de todos os passos."); return; }
  } else if (manualTipoAcessorio === "pdf") {
    if (!manualPdfBase64) { alert("Anexe o PDF do manual."); return; }
  } else if (manualTipoAcessorio === "video") {
    if (!manualVideoBase64) { alert("Anexe o vídeo do manual."); return; }
  }

  const passosFinal = passos.map(p => {
    const base = p.imagemBase64
      ? { texto: p.texto, imagemBase64: p.imagemBase64 }
      : p.imagemOriginal
        ? { texto: p.texto, imagem: p.imagemOriginal }
        : { texto: p.texto };
    if (p.videoBase64) base.videoBase64 = p.videoBase64;
    return base;
  });

  const btn = document.getElementById("btn-salvar-acessorio");
  btn.disabled = true;
  try {
    if (idEditarAcessorio) {
      const patch = { fabricanteId, nome, categoria, especificacoes, manualTipo: manualTipoAcessorio, manualPdfBase64, manualVideoBase64, passos: passosFinal };
      if (capaBase64) patch.imagemBase64 = capaBase64;
      await editarAcessorio(idEditarAcessorio, patch);
      formAlterado = false;
      window.location.href = `acessorio.html?id=${idEditarAcessorio}`;
      return;
    }

    const acessorio = { fabricanteId, nome, categoria, especificacoes, manualTipo: manualTipoAcessorio, manualPdfBase64, manualVideoBase64, imagemBase64: capaBase64, passos: passosFinal };
    await criarAcessorio(acessorio);
    formAlterado = false;
    window.location.href = `fabricante.html?id=${fabricanteId}`;
  } catch (e) {
    alert(e.message);
  } finally {
    btn.disabled = false;
  }
}

async function salvarFabricante() {
  if (!podeAdicionar()) { window.location.href = "login.html"; return; }
  const nome = document.getElementById("input-fabricante-nome").value.trim();
  const cor = document.getElementById("input-fabricante-cor").value || "#2f6b4f";
  const site = document.getElementById("input-fabricante-site").value.trim();

  if (!nome) { alert("Informe o nome do fabricante."); return; }

  const btn = document.getElementById("btn-salvar-fabricante");
  btn.disabled = true;
  try {
    if (idEditarFabricante) {
      const patch = { nome, cor, tipo: tipoFabricanteAtual, site };
      if (logoFabricanteBase64) patch.logoBase64 = logoFabricanteBase64;
      await editarFabricante(idEditarFabricante, patch);
      formAlterado = false;
      window.location.href = `fabricante.html?id=${idEditarFabricante}`;
      return;
    }

    const criado = await criarFabricante({ nome, cor, logoBase64: logoFabricanteBase64, tipo: tipoFabricanteAtual, site });
    formAlterado = false;
    window.location.href = `fabricante.html?id=${criado.id}`;
  } catch (e) {
    alert(e.message);
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
</html>
