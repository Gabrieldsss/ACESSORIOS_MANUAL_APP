<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Passo a Passo</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="js/plataforma.js"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="phone">
  <div class="topbar">
    <a id="link-voltar" href="index.html" class="back">←</a>
    <h1 id="titulo-topo">Passo a passo</h1>
    <button type="button" class="menu-btn" id="btn-menu" aria-label="Abrir menu">☰</button>
  </div>
  <div class="content" id="conteudo"></div>
</div>

<script src="js/api.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/versao.js"></script>
<script src="js/menu.js"></script>
<script>
const id = getQueryParam("id");
let acessorio = null;
let fabricante = null;
let step = parseInt(getQueryParam("step") || "0", 10);
const conteudo = document.getElementById("conteudo");

document.getElementById("link-voltar").href = `acessorio.html?id=${id}`;

sincronizarCatalogo().then(() => {
  acessorio = getAcessorioPorId(id);
  fabricante = acessorio ? getFabricantePorId(acessorio.fabricanteId) : null;
  render();
});

function render() {
  if (!acessorio) {
    conteudo.innerHTML = emptyState("❓", "Acessório não encontrado.");
    return;
  }
  const total = acessorio.passos.length;
  if (total === 0) {
    conteudo.innerHTML = emptyState("📄", "Esse acessório não tem passo a passo cadastrado — o manual dele é em PDF ou vídeo. Volte e toque no botão de manual na tela anterior.");
    return;
  }
  if (step < 0) step = 0;
  if (step > total - 1) step = total - 1;
  const passo = acessorio.passos[step];

  document.getElementById("titulo-topo").textContent = acessorio.nome;

  if (fabricante) conteudo.style.setProperty("--cor", fabricante.cor);
  const ultimoPasso = step === total - 1;
  conteudo.innerHTML = `
    <div class="progress">Passo ${step + 1} de ${total}</div>
    <div class="progress-bar"><div style="width:${((step + 1) / total) * 100}%"></div></div>
    <div class="step-image">${stepImageHtml(passo)}</div>
    ${stepVideoHtml(passo)}
    <div class="step-text">${passo.texto}</div>
    <div class="nav-buttons">
      <button class="prev" ${step === 0 ? "disabled" : ""} onclick="ir(${step - 1})">← Anterior</button>
      ${ultimoPasso
        ? `<button class="next" onclick="window.location.href='acessorio.html?id=${id}'">Concluir ✓</button>`
        : `<button class="next" onclick="ir(${step + 1})">Próximo →</button>`}
    </div>
    ${ultimoPasso ? `<div id="avaliacao">${avaliacaoHtml()}</div>` : ""}
  `;
}

function avaliacaoHtml() {
  if (jaAvaliou(id)) {
    return `<div class="avaliacao-obrigado">Obrigado pelo feedback! 🙌</div>`;
  }
  return `
    <div class="avaliacao-pergunta">Chegou ao fim! Essa instrução te ajudou?</div>
    <div class="avaliacao-botoes">
      <button type="button" onclick="votar(true)">👍 Sim</button>
      <button type="button" onclick="votar(false)">👎 Não</button>
    </div>
  `;
}

async function votar(util) {
  try {
    await avaliarAcessorio(id, util);
    document.getElementById("avaliacao").innerHTML = avaliacaoHtml();
  } catch (e) {
    // sem internet ou erro no servidor - feedback e "de bonus", nao trava a tela
  }
}

function ir(novoStep) {
  step = novoStep;
  history.replaceState(null, "", `passo.html?id=${id}&step=${step}`);
  render();
}

document.addEventListener("keydown", (e) => {
  if (!acessorio) return;
  if (e.key === "ArrowLeft") {
    if (step > 0) ir(step - 1);
  } else if (e.key === "ArrowRight") {
    if (step < acessorio.passos.length - 1) {
      ir(step + 1);
    } else {
      window.location.href = `acessorio.html?id=${id}`;
    }
  }
});
</script>
</body>
</html>
