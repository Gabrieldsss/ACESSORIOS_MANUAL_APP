<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Acessórios do Fabricante</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="phone">
  <div class="topbar">
    <a href="index.html" class="back">←</a>
    <h1 id="titulo-topo">Fabricante</h1>
    <button type="button" class="menu-btn" id="btn-menu" aria-label="Abrir menu">☰</button>
  </div>
  <div class="content">
    <input class="search" id="busca" type="text" placeholder="Buscar acessório por nome ou categoria...">

    <div class="section-title">Acessórios</div>
    <div class="card-list" id="lista-acessorios"></div>
    <div class="empty" id="vazio-acessorios" style="display:none;"></div>

    <div id="area-gerenciar-fabricante"></div>
  </div>

  <a href="#" class="fab" id="fab-adicionar">+</a>

  <div class="tabbar">
    <a href="index.html"><span class="icon">🏠</span>Início</a>
    <a href="adicionar.html" id="tab-adicionar"><span class="icon">➕</span>Adicionar</a>
    <a href="login.html"><span class="icon">👤</span>Conta</a>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script src="js/versao.js"></script>
<script src="js/menu.js"></script>
<script>
const fabricanteId = getQueryParam("id");

sincronizarCatalogo().then(iniciar);

function iniciar() {
  const fabricante = getFabricantePorId(fabricanteId);

  if (!fabricante) {
    document.querySelector(".content").innerHTML = emptyState("🏷️", "Fabricante não encontrado.");
    return;
  }

  document.getElementById("titulo-topo").textContent = fabricante.nome;
  const fabBtn = document.getElementById("fab-adicionar");
  if (fabBtn) fabBtn.href = `adicionar.html?fabricante=${fabricante.id}`;

  function card(acessorio) {
    const origemUsuario = acessorio.origem === "usuario";
    const badge = `<span class="origem-badge ${origemUsuario ? "usuario" : "catalogo"}">${origemUsuario ? "Meu" : "Catálogo"}</span>`;
    return `<a class="card" href="acessorio.html?id=${acessorio.id}">
      <div class="thumb">${thumbHtml(acessorio)}</div>
      <div class="info">
        <strong>${acessorio.nome}${badge}</strong>
        <span>${categoriaIcone(acessorio.categoria)} ${acessorio.categoria} · ${acessorio.passos.length} passos</span>
      </div>
      ${favoritoBtn(acessorio.id)}
    </a>`;
  }

  function render(filtro) {
    const f = (filtro || "").toLowerCase();
    const { catalogo, meus } = getAcessoriosPorFabricante(fabricante.id);
    const todos = [...catalogo, ...meus];
    const filtrados = todos.filter(a => a.nome.toLowerCase().includes(f) || a.categoria.toLowerCase().includes(f));

    const lista = document.getElementById("lista-acessorios");
    const vazio = document.getElementById("vazio-acessorios");
    if (filtrados.length === 0) {
      lista.innerHTML = "";
      vazio.innerHTML = todos.length === 0
        ? emptyState("📋", "Nenhum acessório cadastrado para este fabricante ainda.")
        : emptyState("🔍", "Nenhum item encontrado.");
      vazio.style.display = "block";
    } else {
      vazio.style.display = "none";
      lista.innerHTML = filtrados.map(card).join("");
    }
  }

  document.getElementById("busca").addEventListener("input", (e) => render(e.target.value));
  render("");

  if (podeAdicionar()) {
    document.getElementById("area-gerenciar-fabricante").innerHTML = `
      <div style="height:16px"></div>
      <a class="btn-secondary" href="adicionar.html?editarFabricante=${fabricante.id}">Editar fabricante</a>
      <div style="height:10px"></div>
      <button class="btn-danger" id="btn-remover-fabricante">Remover fabricante</button>
    `;
    document.getElementById("btn-remover-fabricante").addEventListener("click", async () => {
      if (!confirm(`Remover o fabricante "${fabricante.nome}"? Os acessórios cadastrados nele também serão removidos. Essa ação não pode ser desfeita.`)) return;
      const btn = document.getElementById("btn-remover-fabricante");
      btn.disabled = true;
      try {
        await removerFabricante(fabricante.id);
        window.location.href = "index.html";
      } catch (e) {
        alert(e.message);
        btn.disabled = false;
      }
    });
  }
}
</script>
</body>
</html>
