<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Detalhe do Acessório</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="js/plataforma.js"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="phone">
  <div class="topbar">
    <a href="#" id="link-voltar" class="back">←</a>
    <h1 id="titulo-topo">Acessório</h1>
    <button type="button" class="menu-btn" id="btn-menu" aria-label="Abrir menu">☰</button>
  </div>
  <div class="content" id="conteudo"></div>
</div>

<script src="js/api.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script src="js/versao.js"></script>
<script src="js/menu.js"></script>
<script>
const id = getQueryParam("id");
const conteudo = document.getElementById("conteudo");

sincronizarCatalogo().then(iniciar);

function iniciar() {
  const acessorio = getAcessorioPorId(id);

  if (!acessorio) {
    conteudo.innerHTML = emptyState("❓", "Acessório não encontrado.");
    document.getElementById("link-voltar").href = "index.html";
    return;
  }

  registrarVisto(acessorio.id);

  const fabricante = getFabricantePorId(acessorio.fabricanteId);
  document.getElementById("link-voltar").href = `fabricante.html?id=${acessorio.fabricanteId}`;
  document.getElementById("titulo-topo").textContent = acessorio.nome;

  const podeGerenciar = podeAdicionar();
  const manualTipo = acessorio.manualTipo || "passos";

  const metaCat = manualTipo === "passos"
    ? `${categoriaIcone(acessorio.categoria)} ${acessorio.categoria} · ${acessorio.passos.length} passos`
    : `${categoriaIcone(acessorio.categoria)} ${acessorio.categoria} · Manual em ${manualTipo === "pdf" ? "PDF" : "vídeo"}`;

  const acaoPrincipalHtml = manualTipo === "passos"
    ? `<a class="btn-primary" href="passo.html?id=${acessorio.id}&step=0">Ver instalação</a>`
    : `<button type="button" class="btn-primary" id="btn-ver-manual">${manualTipo === "pdf" ? "📄 Ver manual em PDF" : "▶️ Ver vídeo da instalação"}</button>
       <div id="area-manual" style="display:none;"></div>`;

  const stepListHtml = manualTipo === "passos" ? `
    <div class="section-title">Passo a passo</div>
    <div class="step-list">
      ${acessorio.passos.map((p, i) => `
        <div class="step-row">
          <div class="num">${i + 1}</div>
          <div>${p.texto}</div>
        </div>
      `).join("")}
    </div>
  ` : "";

  conteudo.style.setProperty("--cor", fabricante.cor);
  conteudo.innerHTML = `
    <div class="cover">
      ${thumbHtml(acessorio)}
      ${favoritoBtn(acessorio.id, "fav-btn-floating")}
    </div>
    <div class="brand-badge">${logoImg(fabricante)} ${fabricante.nome}</div>
    <div class="meta">
      <h2>${acessorio.nome}</h2>
      <div class="cat">${metaCat}</div>
      ${podeGerenciar ? `<div class="avaliacao-resumo">👍 ${acessorio.avaliacoesUtil || 0} · 👎 ${acessorio.avaliacoesNaoUtil || 0} avaliações</div>` : ""}
    </div>
    ${acessorio.especificacoes ? `<div class="especificacoes-box">${acessorio.especificacoes}</div>` : ""}
    ${acaoPrincipalHtml}
    <button type="button" class="btn-secondary" id="btn-compartilhar">📤 Compartilhar</button>

    ${stepListHtml}

    ${podeGerenciar ? `
      <div style="height:16px"></div>
      <a class="btn-secondary" href="adicionar.html?editarAcessorio=${acessorio.id}">Editar acessório</a>
      <div style="height:10px"></div>
      <button class="btn-danger" id="btn-remover">Remover acessório</button>
    ` : ""}
  `;

  document.getElementById("btn-compartilhar").addEventListener("click", () => compartilharManual(acessorio));

  if (manualTipo !== "passos") {
    document.getElementById("btn-ver-manual").addEventListener("click", () => {
      const area = document.getElementById("area-manual");
      const abrindo = area.style.display === "none";
      area.style.display = abrindo ? "block" : "none";
      if (abrindo && !area.innerHTML) {
        area.innerHTML = manualTipo === "pdf"
          ? `<div class="manual-pdf-box">
               <iframe src="${acessorio.manualPdfBase64}"></iframe>
               <a class="btn-secondary" href="${acessorio.manualPdfBase64}" download="${acessorio.nome}.pdf">⬇️ Baixar PDF</a>
             </div>`
          : `<video class="manual-video-box" src="${acessorio.manualVideoBase64}" controls></video>`;
      }
    });
  }

  if (podeGerenciar) {
    document.getElementById("btn-remover").addEventListener("click", async () => {
      if (!confirm(`Remover "${acessorio.nome}"? Essa ação não pode ser desfeita.`)) return;
      const btn = document.getElementById("btn-remover");
      btn.disabled = true;
      try {
        await removerAcessorio(acessorio.id);
        window.location.href = `fabricante.html?id=${acessorio.fabricanteId}`;
      } catch (e) {
        alert(e.message);
        btn.disabled = false;
      }
    });
  }
}
</script>
</body>
</html>
